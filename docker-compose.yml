# LiteLLM Proxy + Postgres — запуск на этом ПК
# Использование: скопируйте .env.example в .env, задайте LITELLM_MASTER_KEY и запустите:
#   docker compose up -d

services:
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    ports:
      - "4000:4000"
    volumes:
      - ./config.yaml:/app/config.yaml
    command:
      - "--config=/app/config.yaml"
    environment:
      DATABASE_URL: "postgresql://llmproxy:dbpassword9090@db:5432/litellm"
      STORE_MODEL_IN_DB: "True"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  db:
    image: postgres:16
    restart: always
    container_name: llm_postgres
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: llmproxy
      POSTGRES_PASSWORD: dbpassword9090
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d litellm -U llmproxy"]
      interval: 5s
      timeout: 5s
      retries: 10

  portal:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./portal:/app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://llmproxy:dbpassword9090@db:5432/litellm
      JWT_SECRET: portal-jwt-secret
      LITELLM_PROXY_URL: http://litellm:4000
      LITELLM_MASTER_KEY: sk-1234
    command: sh -c "npm install && npx prisma generate && npm run dev -- -H 0.0.0.0"
    depends_on:
      db:
        condition: service_healthy
      litellm:
        condition: service_healthy

volumes:
  postgres_data:
