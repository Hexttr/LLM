# LiteLLM Proxy — конфигурация моделей и настроек
# Документация: https://docs.litellm.ai/docs/proxy/configs

model_list:
  # Пример: OpenAI (раскомментируйте и задайте OPENAI_API_KEY в .env)
  # - model_name: gpt-4o
  #   litellm_params:
  #     model: openai/gpt-4o
  #     api_key: os.environ/OPENAI_API_KEY
  # - model_name: gpt-4o-mini
  #   litellm_params:
  #     model: openai/gpt-4o-mini
  #     api_key: os.environ/OPENAI_API_KEY

  # Пример: Anthropic
  # - model_name: claude-3-5-sonnet
  #   litellm_params:
  #     model: anthropic/claude-3-5-sonnet-20241022
  #     api_key: os.environ/ANTHROPIC_API_KEY

  # Groq — бесплатный tier, ключ: https://console.groq.com
  - model_name: groq-llama
    litellm_params:
      model: groq/llama-3.1-8b-instant
      api_key: os.environ/GROQ_API_KEY
  - model_name: groq-llama-70b
    litellm_params:
      model: groq/llama-3.1-70b-versatile
      api_key: os.environ/GROQ_API_KEY

litellm_settings:
  set_verbose: false
  # callbacks: ["lago"]  # раскомментировать при настройке биллинга

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  # Глобальный потолок на весь прокси (раскомментируйте и задайте сумму в USD и период)
  # max_budget: 5
  # budget_duration: "30d"
